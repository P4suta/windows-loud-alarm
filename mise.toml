# Project-local toolchain.
# Per dotfiles policy (.chezmoidata.toml): project-specific tool versions
# live in-repo, not in the global mise config.
[tools]
dotnet = "10.0.300"
# Pin `just` (and the related dev tools) so CI runners have them without depending
# on the developer's global mise config. Locally these have always been provided
# by the user-level mise; tracking them per-project here makes `mise install`
# reproducible on a fresh checkout / on jdx/mise-action@v2.
just = "1.51.0"
lefthook = "2.1.6"
typos = "latest"
# `uv` drives the SubsetFonts target in src/Alarm.Presentation/Alarm.Presentation.csproj
# (mise exec -- uv run --with fonttools python tools/subset-fonts.py). uv brings its
# own Python on demand, so we don't need to pin python here separately.
uv = "latest"

# Persistent MSBuild server. Avoids spinning up a fresh msbuild.exe per
# `dotnet build` / `dotnet test` invocation — a big win for the tight
# inner loop of `just check` and warm-incremental builds. Affects every
# dotnet call inside `mise exec --`, which is how justfile recipes run.
[env]
# Persistent MSBuild server (see comment above [env]).
MSBUILDUSESERVER = "1"
# Microsoft.Testing.Platform telemetry: opt out so test runs don't print the
# telemetry banner every time and don't phone home.
TESTINGPLATFORM_TELEMETRY_OPTOUT = "1"
