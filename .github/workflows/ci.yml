name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run of the same ref (push or PR) when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-publish:
    name: build + test + publish (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      # Match local: persistent MSBuild server + MTP telemetry opt-out.
      MSBUILDUSESERVER: "1"
      TESTINGPLATFORM_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up mise (pins dotnet 10.0.300 + just)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # ── Quality gate (mirrors `just check`) ─────────────────────────────────
      - name: Restore (locked-mode)
        run: mise exec -- just restore

      - name: Build (strict analyzers)
        run: mise exec -- just build

      - name: Test (MTP exes, parallel collections)
        run: mise exec -- just test-fast

      - name: Format check
        run: mise exec -- just format-check

      # ── Perf observability ──────────────────────────────────────────────────
      - name: Capture binlog + PerformanceSummary
        run: mise exec -- just measure-binlog

      - name: Capture analyzer report
        run: mise exec -- just analyzer-report

      - name: MSBuild BuildCheck
        run: mise exec -- just lint-build
        continue-on-error: true  # BC0301 / advisories shouldn't fail the run

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ github.run_number }}
          path: artifacts/perf/
          if-no-files-found: ignore

      # ── Release publish ─────────────────────────────────────────────────────
      - name: Publish self-contained (win-x64)
        run: mise exec -- just publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: alarm-win-x64-${{ github.run_number }}
          path: publish/win-x64/
          if-no-files-found: error
