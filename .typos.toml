# typos config — skip binaries and generated trees.
#
# typos has heuristic binary detection but it mis-classifies some glyph-rich
# OpenType/TrueType fonts as text (the cmap table contains long runs of
# printable ASCII that look like words). Be explicit.

[files]
extend-exclude = [
    "*.ttf",
    "*.otf",
    "*.woff",
    "*.woff2",
    "*.ico",
    "*.png",
    "*.jpg",
    "*.pdf",
    "*.binlog",
    "publish/**",
    "artifacts/**",
    "**/obj/SubsetFonts/**",
    "**/packages.lock.json",
]
